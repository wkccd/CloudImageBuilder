name: build-N1
on:
  workflow_dispatch:
    inputs:
      openwrt_kernel:
        description: "选择构建的内核"
        required: false
        default: "5.10.235"
        type: choice
        options:
          - 5.10.235
          - 5.15.189
          - 6.1.146
          - 6.6.93
          - 6.12.39
      include_docker:
        description: |
          是否编译 Docker 插件
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      replace_banner:
        description: '替换为ImmortalWrt的banner信息'
        required: false
        default: false
        type: boolean
      openwrt_soc:
        description: "Select device board"
        required: false
        default: "e52c"
        type: choice
        options:
          - all
          - s922x_s905x3_s905x2_s912_s905d_s905
          - ak88
          - beikeyun
          - cm3
          - e20c
          - e24c
          - e25
          - e52c
          - e54c
          - ht2
          - h28k
          - h66k
          - h68k
          - h69k
          - h69k-max
          - h88k
          - h88k-v3
          - jp-tvbox
          - l1pro
          - photonicat
          - qemu
          - r66s
          - r68s
          - rock5b
          - rock5c
          - rk3399
          - s905
          - s905d
          - s905x2
          - s905x3
          - s912
          - s922x
          - s922x-n2
          - vplus
          - watermelon-pi
          - zcube1-max
          - diy
      rootfs_partsize:
        description: '软件包大小1G固定'
        required: true
        default: "1024"
        type: choice
        options:
          - '1024'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/n1/build.sh

      - name: Debug workspace contents
        run: ls -R

      - name: 处理是否替换banner信息
        if: ${{ github.event.inputs.replace_banner == 'true' }}
        run: |
          cp n1/99-banner.sh files/etc/uci-defaults/
  
      - name: Downloading ImmortalWrt rootfs
        run: |
          wget -O immortalwrt-24.10.2-armsr-armv8-generic-rootfs.tar.gz https://github.com/wukongdaily/AutoBuildImmortalWrt/releases/download/phicomm-n1/immortalwrt-24.10.2-armsr-armv8-generic-rootfs.tar.gz


      - name: Package armsr-armv8 as ImmortalWrt for N1
        uses: wukongdaily/flippy-openwrt-actions@master
        if: ${{ steps.down.outputs.status }} == 'success' && !cancelled()
        env:
          OPENWRT_ARMVIRT: immortalwrt-24.10.2-armsr-armv8-generic-rootfs.tar.gz
          PACKAGE_SOC: ${{ inputs.openwrt_soc }}
          KERNEL_VERSION_NAME: ${{ inputs.openwrt_kernel }}
          KERNEL_AUTO_LATEST: false
          WHOAMI: "wukongdaily"

      - name: Rename .img.gz file
        id: rename
        run: |
          FILE=$(ls ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz | head -n1)
          echo "Image file is: $FILE"
          FILENAME=$(basename "$FILE")
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          KERNEL_VERSION=$(echo "$FILENAME" | grep -oP 'k\d+\.\d+\.\d+')
          MODEL=${{ inputs.openwrt_soc }}
          mv "$FILE" "${{ env.PACKAGED_OUTPUTPATH }}/immortalwrt-24.10.2-$MODEL-btrfs-$KERNEL_VERSION.img.gz"


      - name: Upload firmware to GitHub Releases
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ inputs.openwrt_soc }}
          name: ImmortalWrt for ${{ inputs.openwrt_soc }}
          body_path: ${{ github.workspace }}/n1/info.md
          files: |
            ${{ env.PACKAGED_OUTPUTPATH }}/*.img.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
